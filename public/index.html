<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Security Audit Lite</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="hero">
    <div>
      <h1>OpenClaw 安全体检与持续巡检</h1>
      <p>10 分钟判断你的 OpenClaw 部署是否存在暴露、权限或审计风险。</p>
      <div id="ctaBox" class="button-row"></div>
    </div>
    <div class="badge">v0.6</div>
  </header>

  <nav class="nav-links">
    <a href="/report.html">查看示例报告</a>
    <a href="/admin.html">线索后台</a>
  </nav>

  <section class="stats">
    <div class="card"><strong>6+</strong><span>高价值检查项</span></div>
    <div class="card"><strong>异步交付</strong><span>适合低服务消耗</span></div>
    <div class="card"><strong>可升级</strong><span>可扩展为持续巡检</span></div>
  </section>

  <section>
    <h2>核心检查项</h2>
    <div id="checks" class="grid"></div>
  </section>

  <section>
    <h2>套餐方案</h2>
    <div id="plans" class="grid"></div>
  </section>

  <section class="lead-box">
    <div>
      <h2>申请首批安全体检</h2>
      <p>提交结构化部署信息，我们将生成动态风险预览与体检线索。</p>
    </div>
    <form id="leadForm" class="lead-form"></form>
    <div>
      <p id="leadResult" class="lead-result"></p>
      <div id="scoreResult" class="score-box"></div>
      <div id="reportPreview" class="score-box"></div>
      <div id="remediationPreview" class="score-box"></div>
      <div class="button-row">
        <a class="cta-btn" href="/api/report-output" target="_blank">查看 Markdown 报告示例</a>
        <button id="exportBtn" class="cta-btn primary" type="button">导出正式报告</button>
      </div>
    </div>
  </section>

  <script src="/app.js"></script>
</body>
</html>
